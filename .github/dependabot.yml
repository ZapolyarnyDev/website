version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 9 * * 2,5"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"

    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

    groups:
      production-deps:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"